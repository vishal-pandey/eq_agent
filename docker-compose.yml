services:
  eq-helper:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - eq_helper/.env
    environment:
      - TEMPORAL_HOST=${TEMPORAL_HOST:-localhost:7233}
      - N8N_FOLLOWUP_WEBHOOK_URL=${N8N_FOLLOWUP_WEBHOOK_URL:-}
    restart: unless-stopped

  temporal-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m temporal.worker
    env_file:
      - eq_helper/.env
    environment:
      - TEMPORAL_HOST=${TEMPORAL_HOST:-localhost:7233}
    restart: unless-stopped
