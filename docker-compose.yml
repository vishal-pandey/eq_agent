services:
  eq-helper:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - eq_helper/.env
    environment:
      - TEMPORAL_HOST=${TEMPORAL_HOST:-localhost:7233}
      - N8N_FOLLOWUP_WEBHOOK_URL=${N8N_FOLLOWUP_WEBHOOK_URL:-}
      - DATABASE_URL=${DATABASE_URL:-}
    restart: unless-stopped

  temporal-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m temporal.worker
    env_file:
      - eq_helper/.env
    environment:
      - TEMPORAL_HOST=${TEMPORAL_HOST:-localhost:7233}
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-EQPlatform@12345}
    restart: unless-stopped
