services:
  eq-helper:
    image: ghcr.io/vishal-pandey/eq_agent:${IMAGE_TAG:-latest}
    ports:
      - "8000:8000"
    env_file:
      - eq_helper/.env
    environment:
      - TEMPORAL_HOST=${TEMPORAL_HOST:-localhost:7233}
      - N8N_FOLLOWUP_WEBHOOK_URL=${N8N_FOLLOWUP_WEBHOOK_URL:-}
      - DATABASE_URL=${DATABASE_URL:-}
    restart: unless-stopped

  temporal-worker:
    image: ghcr.io/vishal-pandey/eq_agent:${IMAGE_TAG:-latest}
    command: python -m temporal.worker
    env_file:
      - eq_helper/.env
    environment:
      - TEMPORAL_HOST=${TEMPORAL_HOST:-localhost:7233}
    restart: unless-stopped
